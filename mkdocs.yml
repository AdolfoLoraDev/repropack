site_name: ReproPack
site_description: Reproducible research packages (.rpk) with frozen environments and W3C PROV provenance.
repo_url: https://github.com/tu-org/repropack
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
  features:
    - navigation.sections
    - content.code.copy
nav:
  - Home: index.md
  - Quick-Start Tutorial: tutorial.md
  - Commands: commands.md
  - Plugins & Exporters: plugins.md
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true
